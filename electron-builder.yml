appId: com.aidm.app
productName: AIDM
copyright: Copyright © 2025 AIDM

# 目录配置
directories:
  output: release
  buildResources: build

# 文件配置
files:
  - from: .
    filter:
      - dist/**/*
      - electron/**/*
      - package.json

# 关闭 asar 打包，使用独立文件（方便调试和避免路径问题）
asar: false

# 包含额外资源
extraResources:
  - from: pbi-proxy/pbi-proxy.exe
    to: pbi-proxy/pbi-proxy.exe

# Windows 配置
win:
  target:
    - target: nsis
      arch:
        - x64

# NSIS 安装包配置
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AIDM
  license: LICENSE.txt

# 发布配置（可选）
publish:
  provider: generic
  url: https://releases.aidm.com/